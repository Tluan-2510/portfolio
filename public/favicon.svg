<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Modern Abstract "Floating" Logo -->
  <circle cx="40" cy="40" r="25" fill="url(#g1)" opacity="0.9" />
  <circle cx="65" cy="65" r="18" fill="#00e5ff" opacity="0.6">
    <animate attributeName="cy" values="65;60;65" dur="3s" repeatCount="indefinite" />
  </circle>
  <rect x="25" y="25" width="50" height="50" rx="10" fill="none" stroke="white" stroke-width="2" transform="rotate(45 50 50)" />
</svg>
